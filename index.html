<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Markerless Atom AR</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    h2 {
      margin: 15px;
    }

    model-viewer {
      width: 100%;
      height: 75vh;
      background-color: #ffffff;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      padding: 10px 18px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>3D Atom Model</h2>

  <model-viewer
    id="atomViewer"
    src="assets/atom.glb"
    ios-src="assets/atom.usdz"
    alt="3D Atom Model"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1"
    exposure="1"
    scale="1 1 1">
  </model-viewer>

  <div class="controls">
    <button onclick="makeBigger()">Zoom In</button>
    <button onclick="makeSmaller()">Zoom Out</button>
    <button onclick="resetModel()">Reset</button>
  </div>

  <script>
    const viewer = document.querySelector("#atomViewer");

    let currentScale = 1;

    function makeBigger() {
      currentScale += 0.2;
      viewer.scale = `${currentScale} ${currentScale} ${currentScale}`;
    }

    function makeSmaller() {
      if (currentScale > 0.3) {
        currentScale -= 0.2;
        viewer.scale = `${currentScale} ${currentScale} ${currentScale}`;
      }
    }

    function resetModel() {
      currentScale = 1;

      viewer.scale = "1 1 1";
      viewer.cameraOrbit = "0deg 75deg 105%";
      viewer.cameraTarget = "auto auto auto";
      viewer.autoRotate = true;
    }
  </script>

</body>
</html>
