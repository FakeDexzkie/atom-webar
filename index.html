<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Atom WebAR Project</title>

  <!-- A-Frame Library -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js Library for A-Frame -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs>

    <!-- Asset Manager -->
    <a-assets>
      <a-asset-item id="atomModel" src="assets/atom.glb"></a-asset-item>
    </a-assets>

    <!-- Hiro Marker -->
    <a-marker preset="hiro">

      <!-- 3D Atom Model -->
      <a-entity
        gltf-model="#atomModel"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.5 0.5 0.5">
      </a-entity>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
