<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interactive Atom Model</title>

  <!-- model-viewer -->
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      overflow-x: hidden;
    }

    h2 {
      margin: 12px;
    }

    model-viewer {
      width: 100%;
      height: 68vh;
      background-color: #ffffff;
    }

    .controls {
      margin-top: 10px;
      padding: 8px;
    }

    button {
      padding: 10px 14px;
      margin: 4px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background-color: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #1e40af;
    }

    #handVideo {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 160px;
      height: 120px;
      border-radius: 10px;
      border: 2px solid #2563eb;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
      background: #000;
      z-index: 10;
    }

    #status {
      font-size: 14px;
      margin: 6px;
      color: #333;
    }
  </style>
</head>

<body>

  <h2>3D Atom Model</h2>

  <model-viewer
    id="atomViewer"
    src="assets/atom.glb"
    ios-src="assets/atom.usdz"
    alt="3D Atom Model"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1"
    exposure="1"
    scale="1 1 1"
    camera-orbit="0deg 75deg 105%">
  </model-viewer>

  <div class="controls">
    <button onclick="makeBigger()">Zoom In</button>
    <button onclick="makeSmaller()">Zoom Out</button>
    <button onclick="resetModel()">Reset</button>
    <button id="handBtn" onclick="toggleHandControl()">Hand Control: Off</button>
  </div>

  <p id="status">Touch screen controls are active.</p>

  <video id="handVideo" autoplay playsinline muted></video>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const viewer = document.querySelector("#atomViewer");
    const video = document.querySelector("#handVideo");
    const statusText = document.querySelector("#status");
    const handBtn = document.querySelector("#handBtn");

    let currentScale = 1;
    let currentRotation = 0;

    let handControlEnabled = false;
    let handLandmarker = null;
    let webcamStream = null;
    let lastVideoTime = -1;

    let previousPinchDistance = null;

    window.makeBigger = function () {
      currentScale += 0.2;
      applyScale();
    };

    window.makeSmaller = function () {
      if (currentScale > 0.3) {
        currentScale -= 0.2;
        applyScale();
      }
    };

    window.resetModel = function () {
      currentScale = 1;
      currentRotation = 0;
      previousPinchDistance = null;

      viewer.scale = "1 1 1";
      viewer.cameraOrbit = "0deg 75deg 105%";
      viewer.cameraTarget = "auto auto auto";
      viewer.autoRotate = true;

      statusText.innerText = handControlEnabled
        ? "Hand control is active. Move your index finger left/right to rotate. Pinch to zoom."
        : "Touch screen controls are active.";
    };

    window.toggleHandControl = async function () {
      if (!handControlEnabled) {
        await startHandControl();
      } else {
        stopHandControl();
      }
    };

    function applyScale() {
      viewer.scale = `${currentScale} ${currentScale} ${currentScale}`;
    }

    function applyRotation() {
      viewer.cameraOrbit = `${currentRotation}deg 75deg 105%`;
    }

    async function createHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });
    }

    async function startHandControl() {
      try {
        if (!handLandmarker) {
          statusText.innerText = "Loading hand tracking...";
          await createHandLandmarker();
        }

        webcamStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user"
          },
          audio: false
        });

        video.srcObject = webcamStream;
        video.style.display = "block";

        handControlEnabled = true;
        handBtn.innerText = "Hand Control: On";

        viewer.autoRotate = false;

        statusText.innerText =
          "Hand control is active. Move your index finger left/right to rotate. Pinch to zoom.";

        predictWebcam();
      } catch (error) {
        console.error(error);
        statusText.innerText =
          "Camera permission is needed for hand control. Touch controls still work.";
      }
    }

    function stopHandControl() {
      handControlEnabled = false;
      handBtn.innerText = "Hand Control: Off";
      video.style.display = "none";
      previousPinchDistance = null;

      if (webcamStream) {
        webcamStream.getTracks().forEach(track => track.stop());
        webcamStream = null;
      }

      statusText.innerText = "Touch screen controls are active.";
    }

    async function predictWebcam() {
      if (!handControlEnabled || !handLandmarker) return;

      if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const results = handLandmarker.detectForVideo(
          video,
          performance.now()
        );

        if (results.landmarks && results.landmarks.length > 0) {
          const hand = results.landmarks[0];

          const thumbTip = hand[4];
          const indexTip = hand[8];

          // -----------------------------
          // ROTATION
          // Move index finger left/right
          // -----------------------------
          const xPosition = indexTip.x;

          // Because selfie camera is mirrored, this feels more natural
          currentRotation = (0.5 - xPosition) * 360;
          applyRotation();

          // -----------------------------
          // SCALE
          // Pinch thumb and index finger
          // -----------------------------
          const dx = thumbTip.x - indexTip.x;
          const dy = thumbTip.y - indexTip.y;
          const pinchDistance = Math.sqrt(dx * dx + dy * dy);

          if (previousPinchDistance !== null) {
            const difference = pinchDistance - previousPinchDistance;

            if (Math.abs(difference) > 0.01) {
              currentScale += difference * 3;

              if (currentScale < 0.3) currentScale = 0.3;
              if (currentScale > 3.0) currentScale = 3.0;

              applyScale();
            }
          }

          previousPinchDistance = pinchDistance;

          statusText.innerText =
            "Hand detected: index finger rotates, pinch zooms.";
        } else {
          previousPinchDistance = null;
          statusText.innerText =
            "Show your hand to the camera. Touch controls still work.";
        }
      }

      requestAnimationFrame(predictWebcam);
    }
  </script>

</body>
</html>
